<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support — HART</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-texture"></div>
  <div class="wrap">
    <div id="site-header"></div>
    <section class="hero compact">
      <p class="hero-tagline" data-i18n="nav.support">Support</p>
      <h1><span class="gold" data-i18n="support.title">Support</span></h1>
      <p class="lead" data-i18n="support.lead">We reply within 24 hours.</p>
    </section>
    <div class="cabinet-grid">
      <div class="auth-card">
        <h2 style="font-family:var(--font-display);color:var(--gold)" data-i18n="support.email">Email</h2>
        <p style="font-size:1.1rem;margin:0.75rem 0">
          <a id="support-mail" href="mailto:freelancerwok@mail.ru" style="color:var(--gold-light)">freelancerwok@mail.ru</a>
        </p>
      </div>
      <div class="auth-card">
        <h2 style="font-family:var(--font-display);color:var(--gold)" data-i18n="support.telegram">Telegram</h2>
        <p class="pay-hint" data-i18n="support.tg_hint">Access and payments</p>
        <a id="support-tg" class="btn btn-gold" href="https://t.me/uportbot" target="_blank" rel="noopener" style="display:inline-block;margin-top:1rem">@uportbot</a>
      </div>
    </div>
    <div id="site-footer"></div>
  </div>
  <script src="config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/region.js"></script>
  <script src="js/session.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/support-boot.js"></script>
</body>
</html>
