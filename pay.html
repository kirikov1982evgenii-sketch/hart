<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Оплата — Клуб знаний HART</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-texture"></div>
  <div class="wrap" style="max-width:560px;padding-top:1rem">
    <div id="site-header"></div>
    <p class="breadcrumb"><a href="index.html" data-i18n="nav.catalog">Каталог</a> / <span data-i18n="pay.breadcrumb">Оплата</span></p>
    <div id="course-preview" class="pay-course-preview"></div>
    <div id="pay-root"></div>
    <div id="after-paid" class="hidden">
      <div class="pay-box" style="border-color:var(--gold)">
        <h2 id="pay-approved-title" style="font-family:var(--font-display);color:var(--gold)" data-i18n="pay.access_title">Доступ открыт</h2>
        <p id="open-course-msg" data-i18n="pay.access_msg">Курс добавлен в личный кабинет.</p>
        <a id="btn-open-course" class="btn btn-gold btn-link" href="cabinet.html" data-i18n="pay.cabinet">Перейти в кабинет →</a>
      </div>
    </div>
    <div id="site-footer"></div>
  </div>
  <script src="config.js"></script>
  <script src="js/i18n.js?v=3.5"></script>
  <script src="js/region.js"></script>
  <script src="js/security.js"></script>
  <script src="js/session.js"></script>
  <script src="js/layout.js?v=3.5"></script>
  <script src="js/payment-page.js?v=3.5"></script>
</body>
</html>
