# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → repo hart → Apply

services:
  - type: web
    name: hart-payments
    runtime: python
    plan: free
    repo: https://github.com/kirikov1982evgenii-sketch/hart
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python payment_server.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: MARKET_ADMIN_PIN
        sync: false
      - key: MARKET_PAY_SALT
        sync: false
      - key: MARKET_OWNER_EMAIL
        value: freelancerwok@mail.ru
      - key: MARKET_OWNER_PIN
        sync: false
      - key: MARKET_PAY_CARD
        value: "2200702158761978"
      - key: MARKET_PAY_BANK
        value: "Т-Банк"
      - key: MARKET_PAY_NAME
        value: "Евгений"
      - key: MARKET_PRICE_RUB
        value: "199"
      - key: MARKET_PRICE_USD
        value: "4.99"
      - key: MARKET_PAYPAL_EMAIL
        value: freelancerwok@mail.ru
      - key: MARKET_SUPPORT_EMAIL
        value: freelancerwok@mail.ru
      - key: HART_TELEGRAM_BOT_TOKEN
        sync: false
      - key: HART_TELEGRAM_CHAT_ID
        sync: false
      - key: HART_SITE_URL
        value: "https://kirikov1982evgenii-sketch.github.io/hart"
      - key: MARKET_CORS_ORIGINS
        value: "https://kirikov1982evgenii-sketch.github.io/hart"

  - type: worker
    name: hart-telegram-bot
    runtime: python
    plan: free
    repo: https://github.com/kirikov1982evgenii-sketch/hart
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: HART_TELEGRAM_BOT_TOKEN
        sync: false
      - key: HART_TELEGRAM_CHAT_ID
        sync: false
      - key: HART_SITE_URL
        value: "https://kirikov1982evgenii-sketch.github.io/hart"
      - key: MARKET_PAYMENT_API
        value: "https://hart-payments.onrender.com"
      - key: MARKET_SUPPORT_EMAIL
        value: freelancerwok@mail.ru
      - key: MARKET_PAY_CARD
        value: "2200702158761978"
      - key: MARKET_PAY_BANK
        value: "Т-Банк"
      - key: MARKET_PAY_NAME
        value: "Евгений"
      - key: MARKET_PRICE_RUB
        value: "199"
      - key: MARKET_PRICE_USD
        value: "4.99"
